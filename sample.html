<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="StudySmart Planner Login Page">

    <title>StudySmart Planner | Login</title>

    <link rel="stylesheet" href="assets/css/styles.css">

    <script src="https://kit.fontawesome.com/62d2ea7a17.js" crossorigin="anonymous"></script>
</head>

<body>

    <div class="container">

        <div class="form-box">

            <h1 id="title">Sign Up</h1>

            <form>

                <div class="input-group">

                    <div class="input-field" id="nameField">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="Name">
                    </div>

                    <div class="input-field">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" placeholder="Email">
                    </div>

                    <div class="input-field">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Password">
                    </div>

                    <p>
                        Lost password?
                        <a href="#">Click here</a>
                    </p>

                </div>

                <div class="btn-field">
                    <button type="button" id="signupBtn">
                        Sign Up
                    </button>

                    <button type="button" id="signinBtn" class="disable">
                        Sign In
                    </button>
                </div>

            </form>

        </div>

    </div>

    <script>
        let signupBtn = document.getElementById("signupBtn");
        let signinBtn = document.getElementById("signinBtn");
        let nameField = document.getElementById("nameField");
        let title = document.getElementById("title");

        signinBtn.onclick = function () {

            nameField.style.maxHeight = "0";
            nameField.style.margin = "0";

            title.innerHTML = "Sign In";

            signupBtn.classList.add("disable");
            signinBtn.classList.remove("disable");
        }

        signupBtn.onclick = function () {

            nameField.style.maxHeight = "60px";
            nameField.style.margin = "15px 0";

            title.innerHTML = "Sign Up";

            signupBtn.classList.remove("disable");
            signinBtn.classList.add("disable");
        }
    </script>

</body>

</html>
