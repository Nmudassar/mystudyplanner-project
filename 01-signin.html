<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Basic page setup -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="A simple study planner to help you organize your study schedule.">
        <title>My Study Planner | Dashboard</title>

        <!-- Main stylesheet -->
        <link rel="stylesheet" href="assets/css/styles.css">
        <script src="https://kit.fontawesome.com/62d2ea7a17.js" crossorigin="anonymous"></script>
       
    </head>
    
    <body>
        <!-- Sigin in/signup  button-->
        <div class="signin-container">

            <div class="form-box">

                <h1 id="title">Sign Up</h1>

                <form>

                    <div  class="input-group">
                        <div class="input-field" id="nameField">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" id="name"  placeholder="Name">
                        </div>

                        <div class="input-field">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="email" placeholder="Email">
                        </div>

                        <div class="input-field">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password"  placeholder="Password">
                        </div>

                        <p>Lost password? 
                             <a href="#">Click here</a>
                        </p>

                    </div>

                    <div class="btn-field">
                        <button type="button" id="signupBtn">Sign Up</button>
                        <button type="button" id="signinBtn" class="disable">Sign In</button>
                    </div>
                    
                </form>
            </div>
        </div> 
        <!-- Main script -->
        <script src="assets/js/script.js"></script>
        
    </body>

</html>
